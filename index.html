<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veilora | The Veil Lifts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Cinzel', serif; }
        .hero-bg { background: radial-gradient(circle at center, rgba(59, 7, 100, 0.9) 0%, rgba(0, 0, 0, 1) 70%); }
        .coin-glow { animation: coinPulse 4s ease-in-out infinite; filter: drop-shadow(0 0 60px rgb(167 139 250)); }
        @keyframes coinPulse { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.05) rotate(8deg); } }
        .neon-text { text-shadow: 0 0 10px #a5b4fc, 0 0 20px #a5b4fc; }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-lg border-b border-violet-500/20">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-full flex items-center justify-center text-xl font-bold">V</div>
                <span class="title-font text-3xl tracking-widest neon-text">VEILORA</span>
            </div>
            <div class="hidden md:flex items-center gap-10 text-lg">
                <a href="#about" class="hover:text-violet-400 transition">THE VEIL</a>
                <a href="#features" class="hover:text-violet-400 transition">POWER</a>
                <a href="#join" class="hover:text-violet-400 transition">ASCEND</a>
            </div>
            <button onclick="document.getElementById('join').scrollIntoView({behavior: 'smooth'})" class="px-8 py-3 bg-gradient-to-r from-violet-600 to-fuchsia-600 rounded-full font-semibold hover:scale-105 transition">ENTER THE VEIL</button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg min-h-screen flex items-center relative pt-20">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-md px-6 py-2 rounded-full border border-violet-400/30">
                    <span class="text-emerald-400">● LIVE</span>
                    <span class="text-sm tracking-widest">PRESALE PHASE I</span>
                </div>
                <h1 class="title-font text-7xl md:text-8xl leading-none tracking-tighter neon-text">THE VEIL<br>LIFTS</h1>
                <p class="text-3xl md:text-4xl text-violet-300 font-light">Veilora (VLR) — The Key to Digital Sovereignty</p>
                <div class="flex flex-wrap gap-4">
                    <button onclick="document.getElementById('join').scrollIntoView({behavior: 'smooth'})" class="px-10 py-5 bg-white text-black font-bold text-xl rounded-2xl hover:bg-violet-300 transition">CLAIM YOUR SHADOW</button>
                </div>
            </div>
            <div class="flex justify-center">
                <img src="https://files.oaiusercontent.com/file-6zG8vK7pL9mXvN3qR2tY5uW?se=2026-05-21T00%3A00%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D3628800%2C%20immutable&rscd=attachment%3B%20filename%3DGenerated%20Image.jpg" alt="Veilora Coin" class="coin-glow w-full max-w-md rounded-3xl shadow-2xl">
            </div>
        </div>
    </section>

    <!-- About -->
    <section id="about" class="py-24 bg-gradient-to-b from-black to-zinc-950">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="title-font text-6xl mb-8 neon-text">Born from the Cosmos</h2>
            <p class="text-xl text-violet-200">In the shadowed folds between dimensions... Veilora emerges — the key to humanity’s next evolutionary leap.</p>
        </div>
    </section>

    <!-- More sections can be added later -->
    <section id="join" class="py-32 bg-gradient-to-br from-violet-950 to-black text-center">
        <h2 class="title-font text-6xl mb-6">Ready to Pierce the Veil?</h2>
        <button onclick="alert('Presale link coming soon! Join Telegram for updates.')" class="px-12 py-6 bg-white text-black text-2xl font-bold rounded-3xl">BUY $VLR PRESALE</button>
    </section>

</body>
</html>
